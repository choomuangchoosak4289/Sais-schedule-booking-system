<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <title>SAIS Schedule</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SAIS">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/D0021B/FFFFFF?text=SAIS">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        const v = new Date().getTime();
        document.write('<link rel="stylesheet" href="styles.css?v=' + v + '">');
        document.write('<script src="config.js?v=' + v + '"><\/script>');
        document.write('<script src="utils.js?v=' + v + '"><\/script>');
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="App.jsx"></script>

    <script>
        MobileDragDrop.polyfill({ holdToDrag: 300 });
        window.addEventListener('touchmove', function() {}, {passive: false});

        // 📍 ระบบ Zero-Touch Auto Updater
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // ถ้ามีไฟล์ใหม่จาก GitHub ให้รีเฟรชหน้าจออัตโนมัติทันที 1 ครั้ง (ไม่ต้องรอให้ผู้ใช้ทำ)
                                window.location.reload(true);
                            }
                        };
                    };
                });
            });
        }
    </script>
</body>
</html>
