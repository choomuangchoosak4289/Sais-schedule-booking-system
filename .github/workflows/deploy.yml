name: Build and Deploy Enterprise PWA

on:
  push:
    branches: [ main ]

# ตั้งค่าสิทธิ์ให้บอทอ่าน/เขียนหน้าเว็บได้
permissions:
  contents: read
  pages: write
  id-token: write

# เพิ่มการตั้งค่า Environment เพื่อให้ GitHub ยอมให้ Deploy
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # 📍 ประกาศ Environment ตรงนี้ตามที่ Error เรียกร้อง
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Build Tools
        run: |
          npm init -y
          npm install @babel/cli @babel/core @babel/preset-react @babel/preset-env --save-dev

      - name: Compile JSX to JS
        run: |
          # คอมไพล์ React แบบปลอดภัย
          npx babel App.jsx --out-file App.js --presets=@babel/preset-env,@babel/preset-react
          
      - name: Optimize HTML
        run: |
          sed -i '/babel.min.js/d' index.html
          sed -i 's/src="App.jsx"/src="App.js"/g' index.html
          sed -i 's/type="text\/babel"//g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
